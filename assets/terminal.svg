<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; font-size: 13.5px; }
      .sm   { font-family: 'Courier New', Courier, monospace; font-size: 11px; }
      .dim    { fill: #6e7681; }
      .white  { fill: #e6edf3; }
      .green  { fill: #57ab5a; }
      .blue   { fill: #79c0ff; }
      .orange { fill: #ffa657; }
      .muted  { fill: #8b949e; }
      .pink   { fill: #f778ba; }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink  { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

      .l1  { animation: fadeIn 0.05s 0.4s  both; }
      .l2  { animation: fadeIn 0.05s 1.0s  both; }
      .l3  { animation: fadeIn 0.05s 1.6s  both; }
      .l4  { animation: fadeIn 0.05s 2.1s  both; }
      .l5  { animation: fadeIn 0.05s 2.3s  both; }
      .l6  { animation: fadeIn 0.05s 2.5s  both; }
      .l7  { animation: fadeIn 0.05s 2.7s  both; }
      .l8  { animation: fadeIn 0.05s 3.1s  both; }
      .l9  { animation: fadeIn 0.05s 3.6s  both; }
      .l10 { animation: fadeIn 0.05s 3.8s  both; }
      .l11 { animation: fadeIn 0.05s 4.1s  both; }
      .cur { fill: #e6edf3; animation: blink 1s 4.5s infinite; opacity: 0; }
    </style>
  </defs>

  <!-- Window -->
